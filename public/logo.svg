<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <defs>
    <linearGradient id="flameGrad" x1="0" y1="1" x2="0.6" y2="0">
      <stop offset="0" stop-color="#C0552B"/>
      <stop offset="1" stop-color="#D9A03F"/>
    </linearGradient>
    <linearGradient id="baseGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4F8465"/>
      <stop offset="1" stop-color="#2F5240"/>
    </linearGradient>
  </defs>
  <!-- squircle badge -->
  <rect x="2" y="2" width="92" height="92" rx="26" fill="#FAF4E8"/>
  <rect x="2" y="2" width="92" height="92" rx="26" fill="none" stroke="#C0552B" stroke-opacity="0.18" stroke-width="2"/>
  <!-- flame: curves like an "S" -->
  <path d="M48 14
           C 40 22, 58 26, 51 35
           C 46 41, 38 39, 39 47
           C 40 55, 47 58, 48 60
           C 49 58, 58 55, 58 45
           C 58 34, 44 32, 49 24
           C 51 20, 50 16, 48 14 Z"
        fill="url(#flameGrad)"/>
  <!-- inner flame glow -->
  <ellipse cx="48.5" cy="46" rx="4.2" ry="6.5" fill="#F4DFA9" opacity="0.85"/>
  <!-- diya lamp base -->
  <path d="M26 62
           C 26 72, 36 79, 48 79
           C 60 79, 70 72, 70 62
           L 64 62
           C 63 68, 56 72, 48 72
           C 40 72, 33 68, 32 62
           Z"
        fill="url(#baseGrad)"/>
  <rect x="24" y="59.5" width="48" height="5" rx="2.5" fill="#3E6B50"/>
</svg>
